<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Dragon Ball Port | Watch</title>
    <link rel="icon" type="image/x-icon" href="https://b.thumbs.redditmedia.com/VgpGZUKuANeo3HOjv6t-lZqF31zNAFqTTfdP6q_PYQk.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="script.js"></script>
    <style>
        body { 
          background-image: url('https://wallpapers.com/images/hd/shenronand-goku-sky-adventure-td3wsgcpsm09tgb0.jpg');
          background-size: cover;
          background-attachment: fixed;
          background-position: center;
          color: #e2e8f0;
          min-height: 100vh;
        }
        .glass { 
            /*background: rgba(15, 15, 15, 0.75);*/
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .video-container { aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        .audio-btn { 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-weight: 700; 
            font-size: 10px; 
            text-transform: uppercase; 
            transition: all 0.2s;
            white-space: nowrap;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .audio-btn:hover { color: white; }
        .audio-btn.active { background: #ea580c; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
      
      <!-- Dynamic Header -->
      <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-black/40 p-6 rounded-2xl border border-white/10 backdrop-blur-sm">
          <div class="flex items-center gap-4">
              <a href="index.html" class="p-2 hover:bg-white/10 rounded-full transition">
                  <i data-lucide="arrow-left" class="w-6 h-6 text-orange-500"></i>
              </a>
              <div>
                  <h1 id="series-title" class="text-3xl font-black text-orange-500 tracking-tighter uppercase italic">Loading...</h1>
                  <p class="text-gray-300 text-xs font-bold tracking-widest mt-1">SEED OF MIGHT COLOR CORRECTION</p>
              </div>
          </div>
          
          <div class="relative w-full md:w-64">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input 
                  type="text" 
                  id="search-input"
                  placeholder="Search episodes..." 
                  oninput="handleSearch(this.value)"
                  class="w-full bg-green-900/40 border border-green-800/50 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-orange-500 transition text-white placeholder:text-gray-500"
              >
          </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <!-- Player Column -->
          <div class="lg:col-span-2">
              <div class="video-container mb-4 shadow-2xl border border-white/10">
                  <video id="main-video" class="video-js vjs-default-skin w-full h-full" controls preload="auto">
                    <source id="video-source" src="" type="application/x-mpegURL">
                  </video>
              </div>
              <div class="glass p-5 rounded-xl">
                  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                      <div>
                          <h2 id="display-title" class="text-xl font-bold">Select an Episode</h2>
                          <p id="display-meta" class="text-orange-400 text-xs font-bold tracking-widest mt-1 uppercase">Ready to Stream</p>
                      </div>
                  </div>
                  <!-- Audio track buttons render here dynamically -->
                  <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Audio Track Key</p>
                    <div id="audio-track-key" class="flex flex-wrap gap-2 text-[10px] text-gray-400">
                        <span class="text-gray-500">Load an episode to see audio tracks</span>
                    </div>
                </div>
              </div>
          </div>

          <!-- List Column -->
          <div class="lg:col-span-1">
              <div class="glass rounded-2xl p-5 h-[600px] flex flex-col shadow-xl">
                  <h3 class="font-bold mb-4 flex items-center gap-2 text italic">
                      <i data-lucide="list-video" class="w-5 h-5 text-orange-500"></i> 
                      EPISODE GUIDE
                  </h3>
                  <div id="episode-list" class="flex-grow overflow-y-auto pr-2 custom-scrollbar space-y-2">
                      <div class="flex items-center justify-center h-full">
                          <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-orange-500"></i>
                      </div>
                  </div>
              </div>
          </div>
      </main>
  </div>
  <br>
  <footer>
        <p style="text-align:center; background-color: rgba(0, 0, 0, 0.6)"class="text-orange-400 font-bold tracking-widest uppercase text-sm">Learn the process behind Seed of Might's Color Corrections <a style="color: cadetblue"href="SoM_CC_Process.pdf" target="_blank">here</a></p>
    </footer>
</body>
</html>
